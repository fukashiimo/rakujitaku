<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>サポート｜らくじたく+</title>
    <meta name="robots" content="index" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --text: #1a1a1a;
        --muted: #555;
        --accent: #b88628;
        --line: #e6e6e6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0c0b;
          --text: #f0f0f0;
          --muted: #b0b0b0;
          --accent: #f8c86a;
          --line: #2a2d2b;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 40px 20px 80px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
        line-height: 1.85;
      }
      main { max-width: 680px; margin: 0 auto; }
      .eyebrow {
        color: var(--accent);
        font-weight: 700;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        margin: 0 0 8px;
      }
      h1 { font-size: 1.9rem; margin: 0 0 8px; }
      h2 { font-size: 1.2rem; margin: 36px 0 10px; }
      .lead, .muted { color: var(--muted); }
      a { color: var(--accent); }
      .contact {
        display: inline-block;
        margin-top: 6px;
        font-size: 1.1rem;
        font-weight: 700;
      }
      hr { border: none; border-top: 1px solid var(--line); margin: 40px 0; }
      footer { color: var(--muted); font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">RAKUJITAKU+</p>
      <h1>サポート</h1>
      <p class="lead">らくじたく+に関するご質問・不具合のご連絡はこちらからお送りください。</p>

      <h2>お問い合わせ</h2>
      <p>
        ご利用中の端末、iOSのバージョン、状況が分かる内容を添えてご連絡ください。<br />
        <a class="contact" href="mailto:icoca.de.suica@gmail.com">icoca.de.suica@gmail.com</a>
      </p>

      <h2>よくあるご質問</h2>
      <p><strong>料金について</strong><br />らくじたく+は買い切り型のアプリです。定期購入はありません。</p>
      <p><strong>データの取り扱いについて</strong><br />旅行の設定や持ち物リストは端末内でのみ処理され、外部へ送信されません。</p>

      <hr />
      <footer>
        <a href="lp/">らくじたく+について</a> ·
        <a href="privacy.html">プライバシーポリシー</a><br />
        © 2026 らくじたく+
      </footer>
    </main>
  </body>
</html>
