<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>らくじたく</title>
    <meta
      name="description"
      content="泊数を選ぶだけで旅行や帰省の持ち物チェックリストを作れる、静的フロントエンドアプリです。"
    />
    <link rel="canonical" href="https://fukashiimo.github.io/rakujitaku/" />
    <meta name="theme-color" content="#050505" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="らくじたく" />
    <meta property="og:title" content="らくじたく｜泊数を選ぶだけの持ち物チェックリスト" />
    <meta
      property="og:description"
      content="泊数を選ぶだけで旅行や帰省の持ち物チェックリストを作れる無料アプリ。登録不要ですぐ使えます。"
    />
    <meta property="og:url" content="https://fukashiimo.github.io/rakujitaku/" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary" />
    <link rel="stylesheet" href="styles.css?v=20260708e" />
  </head>
  <body>
    <main class="shell">
      <section class="screen is-active" id="homeScreen" aria-labelledby="homeTitle">
        <header class="app-header">
          <p class="eyebrow">RAKUJITAKU</p>
          <h1 id="homeTitle">らくじたく</h1>
          <p class="lead">泊数を選んだら、あとはチェックするだけ。</p>
        </header>

        <div class="panel hero-panel game-panel">
          <div class="game-stage" aria-hidden="true">
            <div class="pixel-stars">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="game-title">
              <strong>らくじたく</strong>
            </div>
            <div class="loading-steps">
              <span class="loading-label">NOW LOADING</span>
              <span class="loading-dot">.</span>
              <span class="loading-dot">.</span>
              <span class="loading-dot">.</span>
            </div>
            <div class="pixel-bag">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <button class="primary-action" type="button" data-go="nights">
            支度をはじめる
          </button>
        </div>

        <section class="section-block" aria-labelledby="savedTitle">
          <div class="section-heading">
            <h2 id="savedTitle">いつもの支度</h2>
            <span id="savedCount">0/3</span>
          </div>
          <div class="saved-list" id="savedList"></div>
        </section>
      </section>

      <section class="screen" id="nightsScreen" aria-labelledby="nightsTitle">
        <button class="back-button" type="button" data-go="home">戻る</button>
        <header class="screen-header">
          <p class="eyebrow">STEP 1</p>
          <h1 id="nightsTitle">何泊しますか？</h1>
        </header>

        <div class="option-grid" id="nightOptions" role="radiogroup" aria-label="泊数">
          <button class="option-card" type="button" data-nights="0">日帰り</button>
          <button class="option-card" type="button" data-nights="1">1泊</button>
          <button class="option-card" type="button" data-nights="2">2泊</button>
          <button class="option-card" type="button" data-nights="3">3泊</button>
          <button class="option-card" type="button" id="moreNightsButton" aria-controls="moreNightsForm" aria-expanded="false">それ以上</button>
        </div>

        <form class="more-nights-form" id="moreNightsForm" hidden>
          <label for="customNights">宿泊数を入力</label>
          <div class="more-nights-row">
            <input id="customNights" name="customNights" type="number" inputmode="numeric" min="4" max="30" value="4" />
            <button type="submit">決定</button>
          </div>
        </form>
      </section>

      <section class="screen" id="prefsScreen" aria-labelledby="prefsTitle">
        <button class="back-button" type="button" data-go="nights">戻る</button>
        <header class="screen-header">
          <p class="eyebrow">STEP 2</p>
          <h1 id="prefsTitle">持っていくものを選ぶ</h1>
          <p class="subcopy">この質問は初回だけ。次からは同じ設定を使えます。</p>
        </header>

        <div class="check-stack" id="preferenceList"></div>

        <details class="weather-section" id="weatherSection">
          <summary class="weather-summary">
            <span>行き先の天気を見る</span>
            <span class="weather-optional">任意</span>
          </summary>
          <div class="weather-body">
            <div class="destination-field">
              <span class="destination-label" id="destinationLabel">行き先</span>
              <div class="destination-control" id="destinationControl">
                <button class="select-trigger" type="button" id="destinationTrigger" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="destinationLabel">
                  <span class="select-trigger-value is-placeholder" id="destinationTriggerLabel">行き先を選ぶ</span>
                  <span class="select-trigger-arrow" aria-hidden="true"></span>
                </button>
                <div class="select-panel" id="destinationPanel" role="listbox" aria-label="行き先の候補" hidden>
                  <div class="select-search">
                    <input type="text" id="destinationFilter" placeholder="都道府県で検索" autocomplete="off" enterkeyhint="search" />
                  </div>
                  <div class="select-options" id="destinationOptions"></div>
                  <p class="select-empty" id="destinationNoMatch" hidden>該当する行き先がありません</p>
                </div>
              </div>
              <div class="selected-destinations" id="selectedDestinations"></div>
            </div>

            <div class="date-field">
              <label class="date-label" for="travelDate">日付</label>
              <div class="date-control">
                <button class="date-preset-button" type="button" data-date-preset="today">今日</button>
                <button class="date-preset-button" type="button" data-date-preset="tomorrow">明日</button>
                <input id="travelDate" name="travelDate" type="date" />
              </div>
            </div>
          </div>
        </details>

        <button class="primary-action full" type="button" id="buildListButton">チェックリストへ</button>
      </section>

      <section class="screen" id="listScreen" aria-labelledby="listTitle">
        <button class="back-button" type="button" id="listBackButton">戻る</button>
        <header class="screen-header compact">
          <p class="eyebrow">CHECKLIST</p>
          <h1 id="listTitle">持ち物チェック</h1>
          <p class="subcopy" id="tripSummary"></p>
        </header>

        <div class="progress-box">
          <div>
            <strong id="progressText">0 / 0</strong>
            <span>準備済み</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span id="progressBar"></span>
          </div>
        </div>

        <div class="list-area" id="checklist"></div>

        <form class="add-form" id="addForm">
          <label for="itemName">持ち物を追加</label>
          <div class="add-row">
            <input id="itemName" name="itemName" type="text" autocomplete="off" placeholder="例：モバイルバッテリー" />
            <button type="submit">追加</button>
          </div>
        </form>

        <div class="suggestions" id="suggestions" aria-label="よく使う持ち物"></div>

        <section class="history-block" aria-labelledby="historyTitle">
          <h2 id="historyTitle">過去に追加した持ち物</h2>
          <div class="history-list" id="itemHistory"></div>
        </section>

        <button class="primary-action full" type="button" id="completeButton">完了</button>
      </section>

      <section class="screen" id="doneScreen" aria-labelledby="doneTitle">
        <header class="screen-header">
          <p class="eyebrow">DONE</p>
          <h1 id="doneTitle">すべて準備完了</h1>
          <p class="subcopy">チェック状態は保存せず、泊数と持ち物だけを残します。</p>
        </header>

        <div class="panel done-panel game-panel">
          <div class="game-stage clear-stage" aria-hidden="true">
            <div class="pixel-stars">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="game-title clear-title">
              <span>CLEAR</span>
              <strong>支度ができました</strong>
            </div>
            <div class="clear-badge">READY</div>
            <div class="pixel-bag">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <label class="save-name-field" for="tripName">
            保存名
            <input id="tripName" name="tripName" type="text" autocomplete="off" placeholder="例：夏の帰省、旅行セット" />
          </label>
          <button class="primary-action full" type="button" id="saveTripButton">
            この支度を保存する
          </button>
          <button class="secondary-action full" type="button" data-go="home">ホームへ戻る</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=20260708e"></script>
  </body>
</html>
